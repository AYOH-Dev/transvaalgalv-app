<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transvaal Galvanisers — Receiving</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="yard.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="yard.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "dark": false,
      "startRoute": "yard",
      "online": true,
      "queueCount": 2
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [route, setRoute] = React.useState(t.startRoute || "yard");
      const [grnReceipt, setGrnReceipt] = React.useState(null);
      const [pendingOpenId, setPendingOpenId] = React.useState(null);

      React.useEffect(() => {
        document.documentElement.setAttribute("data-theme", t.dark ? "dark" : "light");
      }, [t.dark]);

      const openReceipt = (id) => {
        setRoute("receipts");
        setPendingOpenId(id);
      };

      let content;
      if (route === "yard") {
        content = <YardView pods={PODS} online={t.online} queueCount={t.queueCount} onIssueGRN={setGrnReceipt}/>;
      } else if (route === "dashboard") {
        content = <Dashboard pods={PODS} onOpenReceipt={openReceipt} onIssueGRN={setGrnReceipt}/>;
      } else if (route === "receipts") {
        content = <ReceiptsList pods={PODS} onIssueGRN={setGrnReceipt} pendingOpenId={pendingOpenId} onOpened={() => setPendingOpenId(null)}/>;
      } else {
        content = <PlaceholderScreen title={route.charAt(0).toUpperCase() + route.slice(1)}/>;
      }

      return (
        <div className="app-shell">
          <Sidebar route={route} setRoute={setRoute}/>
          <main className="app-main">
            <div className="page-wrap">{content}</div>
          </main>

          {grnReceipt && <GRNModal receipt={grnReceipt} onClose={() => setGrnReceipt(null)}/>}

          <TweaksPanel title="Design tweaks">
            <TweakSection label="Appearance"/>
            <TweakToggle label="Dark mode" value={t.dark} onChange={(v) => setTweak("dark", v)}/>

            <TweakSection label="Yard simulation"/>
            <TweakToggle label="Online" value={t.online} onChange={(v) => setTweak("online", v)}/>
            <TweakSlider label="Queued (offline) submissions" min={0} max={12} step={1}
                         value={t.queueCount} onChange={(v) => setTweak("queueCount", v)}/>

            <TweakSection label="Jump to state"/>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
              <button onClick={() => setRoute("yard")} style={btnStyle}>Yard view</button>
              <button onClick={() => setRoute("dashboard")} style={btnStyle}>Dashboard</button>
              <button onClick={() => setRoute("receipts")} style={btnStyle}>Receipts</button>
              <button onClick={() => setGrnReceipt(PODS.find(p => p.id === "r_02"))} style={btnStyle}>Preview GRN</button>
            </div>
          </TweaksPanel>
        </div>
      );
    }

    const btnStyle = { padding: "8px 10px", fontSize: 12, border: "1px solid var(--border)", borderRadius: 6, background: "var(--surface)", cursor: "pointer", color: "var(--text-primary)", fontFamily: "inherit" };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
